name: CI

on:
  push:
    branches: [main]
  pull_request:

# needed for the bundle commit-back on main (CI is the sole author of assets/overlay.js)
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  julia:
    name: Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GROUP: Core

  no-backend:
    # Holo core with NEITHER backend extension loaded — the "load a renderer" error path.
    # Own job: it must run in a process that never `using`s CairoMakie/WGLMakie, so it can't
    # share a job with `julia` (Core) or `webgl` without risking load order flakiness.
    name: No-backend error path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GROUP: NoBackend

  webgl:
    # The :webgl extension isn't covered by the `julia` job (GROUP=Core loads CairoMakie
    # only). Run its suite — incl. the WGLMakie/Bonito version-coupling guard and the
    # both-loaded rejection — so a dependency bump that moves the wire format fails the
    # gate here instead of only on a manual local run. Pinned per the compat floor Task 4
    # verified (adjust the version below to match whatever that task settled on).
    name: WGLMakie extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Instantiate + test WGLMakie extension
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          GROUP=WebGL julia --project=. -e 'using Pkg; Pkg.test()'

      # Real-browser @bind round-trip: generate the self-contained widget page, then click
      # scatter marker 0 in headless Chromium and assert the overlay emits the right bond
      # value. Covers the browser half the Julia unit tests can't reach.
      - name: Generate :webgl E2E page
        run: julia --project=. test/e2e/make_page.jl "$RUNNER_TEMP/e2e"
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        working-directory: test/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run real-browser @bind E2E
        working-directory: test/e2e
        run: node click.mjs "$RUNNER_TEMP/e2e"
      - name: Verify browser-emitted value through transform_value
        run: julia --project=. test/e2e/verify_capture.jl "$RUNNER_TEMP/e2e"

  webgl-bind-e2e:
    # THROUGH-Pluto @bind E2E: a live headless Pluto kernel + real Chromium. Isolated as its
    # own job (heaviest, and the one most exposed to Pluto-version churn) so it reads cleanly
    # and is trivial to drop if it ever proves flaky.
    name: WGLMakie @bind E2E (Pluto)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        working-directory: test/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Pre-warm env (precompile into the cached depot)
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Through-Pluto @bind round-trip
        working-directory: test/e2e
        run: |
          julia serve.jl 1234 > pluto.log 2>&1 &
          SERVER=$!
          trap 'kill $SERVER 2>/dev/null || true' EXIT
          up=
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:1234 || echo 000)
            [ "$code" = "200" ] && { up=1; break; }
            sleep 2
          done
          [ -n "$up" ] || { echo "::error::Pluto never came up on :1234"; cat pluto.log; exit 1; }
          node bind_click.mjs http://127.0.0.1:1234 "$GITHUB_WORKSPACE/test/e2e/bind_notebook.jl"
      - name: Pluto server log (precompile + render timing)
        if: always()
        working-directory: test/e2e
        run: tail -n 200 pluto.log || true

  examples:
    name: Example notebooks
    runs-on: ubuntu-latest
    # Each notebook devs the package + adds CairoMakie into a temp env (full Makie
    # precompile on a cold cache); generous ceiling so a slow run fails loud, not hangs.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      # Runs every Pluto notebook in examples/ headlessly; fails if any cell errors,
      # so an example can never silently drift out of sync with the package API.
      - name: Run example notebooks headlessly
        run: julia --color=yes examples/ci_run.jl

  frontend:
    name: Frontend (TS) + bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # PRs (incl. forks, which can't push): fail if the committed bundle is stale.
      - name: Verify committed bundle is up to date
        if: github.event_name == 'pull_request'
        working-directory: .
        run: |
          if ! git diff --quiet assets/overlay.js; then
            echo "::error::assets/overlay.js is out of date — run 'cd frontend && npm run build' and commit."
            git --no-pager diff --stat assets/overlay.js
            exit 1
          fi

      # Push to main: CI owns the bundle — commit any rebuild so main is never stale.
      - name: Commit rebuilt bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          if ! git diff --quiet assets/overlay.js; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/overlay.js
            git commit -m "ci: rebuild assets/overlay.js [skip ci]"
            git pull --rebase origin main   # serialize with the webgl-frontend commit-back (different file, no conflict)
            git push
          fi

  webgl-frontend:
    # Same gate as `frontend` but for the :webgl shim, which lives in frontend-webgl/.
    # lint + typecheck + vitest (locks the rewrap<->_plain contract) + build; CI is the sole
    # author of assets/holo-webgl.js, same model as overlay.js.
    name: WGLMakie frontend (TS) + shim bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-webgl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify committed shim bundle is up to date
        if: github.event_name == 'pull_request'
        working-directory: .
        run: |
          if ! git diff --quiet assets/holo-webgl.js; then
            echo "::error::assets/holo-webgl.js is out of date — run 'cd frontend-webgl && npm run build' and commit."
            git --no-pager diff --stat assets/holo-webgl.js
            exit 1
          fi

      - name: Commit rebuilt shim bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          if ! git diff --quiet assets/holo-webgl.js; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/holo-webgl.js
            git commit -m "ci: rebuild assets/holo-webgl.js [skip ci]"
            git pull --rebase origin main   # serialize with the frontend commit-back (different file, no conflict)
            git push
          fi

  format:
    name: Runic formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: fredrikekre/runic-action@v1
        with:
          version: '1'
