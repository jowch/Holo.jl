name = "HoloWGL"
uuid = "49962932-bf43-4880-aefb-6b86913dd528"
authors = ["Jonathan Chen <jwhc@ucla.edu>"]
version = "0.1.0"

# Browser-GPU (:webgl) backend for Holo. A separate package — same monorepo, own deps —
# so WGLMakie/Bonito never enter Holo core's dependency graph. Mirrors how Makie ships
# CairoMakie/GLMakie/WGLMakie as subpackages of one repo.

# Holo is unregistered (same monorepo). [sources] points to it by relative path, so a plain
# `Pkg.instantiate()` resolves it — no manual `dev` of Holo needed. ([sources] needs Julia >= 1.11;
# the [compat] julia = "1.12" below already satisfies that.)
[sources]
Holo = {path = ".."}

[deps]
AbstractPlutoDingetjes = "6e696c72-6542-2067-7265-42206c756150"
Base64 = "2a0f44e3-6c83-55bd-87e4-b1978d98bd5f"
Bonito = "824d6782-a2ef-11e9-3a09-e5662e0c26f8"
Holo = "82b01fb5-7eeb-4559-83ea-8d75f85d4328"
HypertextLiteral = "ac1192a8-f4b3-4bfe-ba22-af5b92cd3ab2"
JSON3 = "0f8b85d8-7281-11e9-16c2-39a750bddbf1"
Makie = "ee78f7c6-11fb-53f2-987a-cfe4a2b5a57a"
Reexport = "189a3867-3050-52da-a836-e630ba90ab69"
WGLMakie = "276b4fcb-3e11-5398-bf8b-a0c2d153d008"

[compat]
# Pin to the WGLMakie/Bonito wire format this backend was validated against (the
# serialize_scene shape + setup_scene_init signature are internal and version-coupled).
AbstractPlutoDingetjes = "1"
Base64 = "1"
Bonito = "4.2"
HypertextLiteral = "0.9, 1"
JSON3 = "1"
Makie = "0.24"
Reexport = "1"
WGLMakie = "0.13"
julia = "1.12"
# NOTE: `Holo` has no [compat] entry — it is unregistered (same monorepo, dev'd by path).
# Add a bound once Holo is registered; until then HoloWGL is path-dev'd, not General-registrable.

[extras]
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["Test"]
